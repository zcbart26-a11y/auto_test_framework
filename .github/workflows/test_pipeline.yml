name: Auto Test Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # 允许在 GitHub 网页上手动点击按钮触发

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 拉取最新代码
      uses: actions/checkout@v4

    - name: 2. 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 3. 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install pytest requests selenium allure-pytest

    - name: 4. 运行 API 接口自动化测试
      run: |
        python -m pytest tests/api/ -s -v

    - name: 5. 运行 UI 自动化测试 (Headless 模式)
      # 注意：在 Linux 服务器上跑 UI 需要安装 Chrome 和配置无头模式，
      # 这里为了演示流水线逻辑，我们可以先跑写好的脚本，遇到报错再调整 UI 脚本支持无头。
      run: |
        python -m pytest tests/ui/ -s -v
