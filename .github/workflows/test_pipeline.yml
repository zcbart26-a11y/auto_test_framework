name: Auto Test Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # 允许在 GitHub 网页上手动点击按钮触发

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 拉取最新代码
      uses: actions/checkout@v4

    - name: 2. 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 3. 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install pytest requests selenium allure-pytest

    - name: 4. 运行 API 接口自动化测试并生成 Allure 数据
      run: |
        python -m pytest tests/api/ -s -v --alluredir=./allure-results

    - name: 5. 运行 UI 自动化测试 (Headless 模式)
      run: |
        python -m pytest tests/ui/ -s -v --alluredir=./allure-results || true  # 加 || true 防止 UI 失败导致跳过报告生成

    - name: 6. 安装 Allure 命令行工具
      run: |
        sudo apt-get update
        sudo apt-get install -y npm
        sudo npm install -g allure-commandline --save-dev

    - name: 7. 生成 Allure HTML 报告
      run: |
        allure generate ./allure-results -o ./allure-report --clean

    - name: 8. 归档测试报告 (Upload Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: Allure-Test-Report
        path: ./allure-report
        retention-days: 7

    - name: 9. 企业微信机器人群组消息通知
      if: always() # 无论成功失败，这步都要执行
      run: |
        # 准备要发送的 Markdown 文案
        STATUS="${{ job.status }}"
        if [ "$STATUS" == "success" ]; then
          MSG="<font color='info'>✅ 接口自动化测试通过！</font>\n> **报告已生成可供下载**"
        else
          MSG="<font color='warning'>❌ 测试执行发生错误！</font>\n> 赶紧上 GitHub 看一看到底咋崩了！"
        fi
        
        # 组装企业微信机器人规定的 JSON 格式
        JSON_DATA="{\"msgtype\": \"markdown\",\"markdown\": {\"content\": \"$MSG\"}}"
        
        # 把这段 JSON 用 POST 方法送到你的专属企微机器人链接里
        # 注意: 现实中 WECHAT_WEBHOOK 我们会存放在 GitHub Secrets 里，这里我暂时写一个假地址。
        # 你回头只要把这个 URL 换成真的就可以了！
        curl -X POST \
        "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=12345678-你的专属-KEY" \
        -H "Content-Type: application/json" \
        -d "$JSON_DATA"

